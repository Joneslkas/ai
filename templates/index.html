<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AI 聊天机器人（示例）</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      #chat { max-width: 720px; }
      .msg { padding: 0.5rem; margin: 0.25rem 0; border-radius: 6px; }
      .user { background:#e6f7ff; text-align:right; }
      .bot  { background:#f6f6f6; text-align:left; }
    </style>
  </head>
  <body>
    <div id="chat">
      <h2>AI 聊天机器人（示例）</h2>
      <div id="messages"></div>
      <input id="input" style="width:80%" placeholder="输入消息..." />
      <button id="send">发送</button>
    </div>
    <script>
      let session_id = null;
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('input');
      document.getElementById('send').onclick = async () => {
        const text = inputEl.value.trim();
        if (!text) return;
        append('user', text);
        inputEl.value = '';
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id, message: text })
        });
        const data = await resp.json();
        session_id = data.session_id;
        append('bot', data.reply);
      };
      function append(role, text){
        const d = document.createElement('div');
        d.className = 'msg ' + (role==='user' ? 'user' : 'bot');
        d.innerText = text;
        messagesEl.appendChild(d);
        window.scrollTo(0, document.body.scrollHeight);
      }
    </script>
  </body>
</html>
